name: Auto Blog Post

on:
  schedule:
    # 月・水・金 JST 9:03 (UTC 0:03)
    - cron: '3 0 * * 1,3,5'
  workflow_dispatch:
    description: '手動でブログ記事を生成'

permissions:
  contents: write

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          npm ci
          pip install google-genai pillow

      - name: Run Claude Code to generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          npm install -g @anthropic-ai/claude-code
          claude -p "
          ブログ記事を自動生成してください。以下の手順で実行:

          1. src/content/blog/ の既存記事を確認し、重複しないテーマを選定
             カテゴリローテーション: agriculture, technology, AI, social, announcement
             前回と異なるカテゴリを選ぶ
          2. .claude/skills/write-blog-article.md の手順に従い2000-3000字の記事を執筆
          3. ファクトチェック: 統計データの出典確認、CLAUDE.md禁止表現チェック
          4. scripts/generate-blog.py でアイキャッチ画像を生成
          5. src/content/blog/{slug}.md と public/blog/{slug}.webp を保存
          6. npx astro build でビルド確認

          注意:
          - CLAUDE.mdの禁止事項を厳守
          - ワサビは除外（地元に大規模栽培あり）
          - 収穫まで長期間かかる品目は除外
          - 画像生成に失敗した場合はimageフィールドを省略して記事のみ公開
          " --allowedTools "Read,Write,Edit,Glob,Grep,Bash(npm*),Bash(npx*),Bash(python*),Bash(git*),WebSearch,WebFetch,Agent"

      - name: Build check
        run: npx astro build

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/blog/ public/blog/
          # 変更がある場合のみコミット
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "blog: auto-generated post $(date +%Y-%m-%d)"
            git push origin main
          fi
