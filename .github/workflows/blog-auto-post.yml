name: Auto Blog Post

on:
  schedule:
    # 月・水・金 JST 9:03 (UTC 0:03)
    - cron: '3 0 * * 1,3,5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clean worktree artifacts
        run: |
          # .claude/worktrees/ がsubmoduleとして誤認識される問題を回避
          rm -rf .claude/worktrees/ 2>/dev/null || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          npm ci
          pip install google-genai pillow

      - name: Collect existing articles
        run: |
          # 既存記事一覧をファイルに書き出し
          > /tmp/existing_articles.txt
          for f in src/content/blog/*.md; do
            [ -f "$f" ] || continue
            slug=$(basename "$f" .md)
            title=$(awk '/^title:/{gsub(/^title:[[:space:]]*[\x27"]?|[\x27"]?$/,""); print; exit}' "$f")
            category=$(awk '/^category:/{gsub(/^category:[[:space:]]*[\x27"]?|[\x27"]?$/,""); print; exit}' "$f")
            echo "- [$category] $title (slug: $slug)" >> /tmp/existing_articles.txt
          done
          echo "=== Existing articles ==="
          cat /tmp/existing_articles.txt
          ARTICLE_COUNT=$(wc -l < /tmp/existing_articles.txt)
          echo "Total: ${ARTICLE_COUNT} articles"
          if [ "$ARTICLE_COUNT" -lt 5 ]; then
            echo "::warning::Expected 10+ articles but found only ${ARTICLE_COUNT}. Article collection may have failed."
          fi

      - name: Verify secrets
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "::error::ANTHROPIC_API_KEY is not set in repository secrets"
            exit 1
          fi
          if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "::warning::GEMINI_API_KEY is not set — images will be skipped"
          fi

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate blog post (attempt 1)
        id: attempt1
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          EXISTING=$(cat /tmp/existing_articles.txt)
          claude -p "
          あなたはOptiens公式ブログの自動記事生成担当です。
          以下の手順を必ず全てWriteツールを使って実行し、ファイルを保存してください。

          【重複防止】以下は既存記事の一覧です。これらと同じテーマ・同じスラッグの記事は絶対に作成しないでください:
          ${EXISTING}

          【必須手順】
          1. src/content/blog/_project-status.md を最初に読み、Optiensの現在の進捗状況を把握する
          2. 上記の既存記事と重複しないテーマを選定
             カテゴリローテーション（6カテゴリ）: agriculture, business, technology, welfare, AI, announcement
             既存記事で最も少ないカテゴリを優先的に選ぶ（カテゴリバランス最優先）
             月曜: agriculture/business/welfareから最少を選択
             水曜: technology/AIから最少を選択
             金曜: 全カテゴリから最少を選択
          3. スラッグ名も既存と重複しないことを確認
          4. .claude/skills/write-blog-article.md の手順に従い2000-3000字の記事を執筆
          5. ファクトチェック: _project-status.mdとの整合性確認、統計データの出典確認、CLAUDE.md禁止表現チェック
          6. scripts/generate-blog.py でアイキャッチ画像を生成（Bashツールで実行）
          7. 【最重要】Writeツールで src/content/blog/{slug}.md にファイルを保存すること
          8. 【最重要】画像も public/images/blog/{slug}.webp に保存されていることを確認
          9. npx astro build でビルド確認

          【カテゴリ戦略（Phase 5を見据えたコンテンツマーケティング）】
          ブログの目的は「水耕栽培の魅力を発信→新規事業者を増やす→Optiensの技術・機材導入の受注」。
          - agriculture: 水耕栽培の魅力・始め方（新規参入者向け）
          - business: 栽培ビジネスの経営情報（事業者・就労支援事業所の管理者向け）
          - technology: IoT×水耕栽培の技術力アピール（導入検討者向け）
          - welfare: 農福連携・就労支援での水耕栽培活用（Phase 5の直接ターゲット）
          - AI: AI×農業の最前線（メディア露出狙い）
          - announcement: 事業進捗報告

          【禁止事項】
          - CLAUDE.mdの禁止事項を厳守（宇宙・SaaS外部販売・医療機関・個人向けEC等）
          - ワサビは除外（地元に大規模栽培あり）
          - 収穫まで長期間かかる品目は除外

          【事実確認ルール（最重要）】
          OptiensはPhase 1（自宅テスト栽培）の開始前段階です。以下を厳守する:
          - 「センサーデータを収集しています」「モニタリングしています」など稼働中を示す現在形を使わない
          - 具体的な実績数値（収集件数・収穫量・売上実績）は一切記載しない（架空データ禁止）
          - 「バジルを収穫しました」「レストランに納品しています」など実績表現は禁止
          - 自社紹介では「設計中」「構築中」「予定」「目標」を使う
          - 技術解説記事として一般論・実装方法を解説することは可（「こうすれば実現できる」）

          【エラー時の対応】
          - 画像生成に失敗した場合はimageフィールドを省略して記事のみ公開
          - ファイルは必ずWriteツールで書き込むこと。書き込まずに終了しないこと。
          " --allowedTools "Read,Write,Edit,Glob,Grep,Bash(npm*),Bash(npx*),Bash(python*),Bash(git*),WebSearch,WebFetch,Agent" --verbose

      - name: Check attempt 1 result
        id: check1
        run: |
          if git status --short src/content/blog/ public/images/blog/ | grep -q .; then
            echo "result=success" >> "$GITHUB_OUTPUT"
            echo "✓ Blog files created on attempt 1"
          else
            echo "result=failed" >> "$GITHUB_OUTPUT"
            echo "::warning::Attempt 1 did not create blog files"
          fi

      - name: Generate blog post (attempt 2 - retry)
        if: steps.check1.outputs.result == 'failed'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          EXISTING=$(cat /tmp/existing_articles.txt)
          echo "::notice::Retrying blog generation..."
          claude -p "
          ブログ記事を1本生成してファイルに保存してください。

          既存記事一覧（重複禁止）:
          ${EXISTING}

          手順:
          1. .claude/skills/write-blog-article.md を読んで手順を確認（カテゴリ6種・ローテーションルール必読）
          2. 既存記事で最も少ないカテゴリを選択（曜日ルール: 月=agriculture/business/welfare, 水=technology/AI, 金=全体最少）
          3. 記事を執筆（2000-3000字）
          4. Writeツールで src/content/blog/{slug}.md に保存
          5. python scripts/generate-blog.py でアイキャッチ画像を生成
          6. npx astro build でビルド確認

          注意: 必ずWriteツールでファイルを書き込んでから終了すること。
          " --allowedTools "Read,Write,Edit,Glob,Grep,Bash(npm*),Bash(npx*),Bash(python*),Bash(git*),WebSearch,WebFetch,Agent" --verbose

      - name: Verify files were created
        run: |
          echo "=== New/modified files ==="
          git status --short src/content/blog/ public/images/blog/
          if git status --short src/content/blog/ public/images/blog/ | grep -q .; then
            echo "✓ New blog files detected"
          else
            echo "::error::No blog files were created after 2 attempts"
            exit 1
          fi

      - name: Build check
        run: npx astro build

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Claude Codeがブログ以外のファイルを変更することがあるため、
          # ブログ関連ファイルのみステージし、それ以外は破棄する
          git checkout -- . 2>/dev/null || true
          git clean -fd --exclude=src/content/blog/ --exclude=public/images/blog/ 2>/dev/null || true
          git add src/content/blog/ public/images/blog/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "blog: auto-generated post $(date +%Y-%m-%d)"
            git pull --rebase --autostash origin main
            git push origin main
          fi
